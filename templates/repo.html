{% extends "base.html" %}

{% block title %}Repository &mdash; RepoMiner{% endblock %}

{% block content %}

<div
  class="container d-flex flex-column justify-content-center align-items-center text-center"
  style="height: 100vh"
>
  <!-- Repo Header -->
  <div class="mb-4">
    <h4 class="fw-bold">owner/repo</h4>
    <p class="text-muted mb-0">Browse and download files or folders</p>
  </div>

  <!-- Breadcrumb -->
  <nav aria-label="breadcrumb" class="mb-3">
    <ol class="breadcrumb">
      <li class="breadcrumb-item">
        <a href="#">root</a>
      </li>
      <li class="breadcrumb-item">
        <a href="#">folder</a>
      </li>
    </ol>
  </nav>

  <!-- File Explorer Card -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <ul class="list-group list-group-flush">

        <!-- Folder Item -->
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            📁 
            <a href="#" class="text-decoration-none">
              images
            </a>
          </div>
          <div>
            <a href="#" class="btn btn-lg">
              <ion-icon name="cloud-download"></ion-icon>
            </a>
          </div>
        </li>

        <!-- File Item -->
        <li class="list-group-item d-flex justify-content-between align-items-center">
          <div>
            📄 app.py
          </div>
          <div>
            <a href="#" class="btn btn-lg">
              <ion-icon name="cloud-download-outline"></ion-icon>
            </a>
          </div>
        </li>

      </ul>
    </div>
  </div>
</div>

{% endblock %}
